<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafios de DOM</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <section>
        <h2>Lab 3: Sistema de Contador (Likes)</h2>
        <h2 id="contador">0</h2>
        <button id="btn-curtir">Curtir</button>
    </section>

    <section>
        <h2>Lab 4: Simular Login</h2>
        <input type="text" id="email" placeholder="Digite seu e-mail">
        <input type="password" id="senha" placeholder="Digite sua senha">
        <button id="btn-login">Login</button>

        <p id="mensagem-login"></p>
    </section>

    <section>
        <h2>Lab 5: Mini Todo List</h2>
        <input type="text" id="input-tarefa" placeholder="Escreva uma tarefa...">
        <button id="btn-adicionar">Adicionar</button>

        <ul id="lista-tarefas"></ul>
    </section>

    <section>
        <h2>Mini Projecto Final: Sistema de Inscrição</h2>
        <input type="text" id="nome" placeholder="Seu nome">
        <input type="number" id="idade" placeholder="Sua idade">
        <button id="btn-inscrever">Inscrever</button>

        <p id="mensagem-inscricao"></p>
    </section>

    <section>
        <h2>Lab: Explorador de DOM</h2>
        <div class="container">
            <div class="card">
                <p>Produto 1</p>
                <button>Remover</button>
            </div>
            <div class="card">
                <p>Produto 2</p>
                <button>Remover</button>
            </div>
            <div class="card">
                <p>Produto 3</p>
                <button>Remover</button>
            </div>

        </div>
    </section>

    <script src="script.js"></script>

</body>

</html>
